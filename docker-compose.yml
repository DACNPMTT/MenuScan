# ============================================
#  MenuScan — Docker Compose (Development)
#
#  git clone → docker compose up --build → xong
#  Không cần .env, không cần cài gì ngoài Docker.
#
#  Secret thật (OCR key, email key, ...) đặt trong
#  .env.local (gitignored) — compose tự load nếu có.
# ============================================

services:
  # ─────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: menuscan-db
    restart: unless-stopped
    ports:
      - "54320:5432"            # port lệch tránh conflict PG local
    environment:
      POSTGRES_DB: menuscan
      POSTGRES_USER: menuscan
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menuscan"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Backend — Python 3.12 + FastAPI
  # ─────────────────────────────────────
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: menuscan-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://menuscan:localdev@db:5432/menuscan
      APP_ENV: development
      LOG_LEVEL: INFO
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: http://localhost:5173
    env_file:                   # secret thật khi cần, optional
      - path: .env.local
        required: false
    volumes:
      - ./app:/app
      - /app/.venv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────
  # Frontend — React 19 + Vite 8
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: menuscan-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
