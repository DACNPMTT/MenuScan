apiVersion: apps/v1
kind: Deployment
metadata:
  name: menuscan-backend
  namespace: dev
  labels:
    app.kubernetes.io/name: menuscan-backend
    app.kubernetes.io/part-of: menuscan
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: menuscan-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: menuscan-backend
        app.kubernetes.io/part-of: menuscan
    spec:
      containers:
        - name: backend
          image: ghcr.io/menuscan/menuscan:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: menuscan-backend-config
            - secretRef:
                name: menuscan-backend-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
