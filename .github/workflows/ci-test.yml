name: Test

on:
  workflow_call:

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: menuscan_test
          POSTGRES_USER: menuscan
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menuscan -d menuscan_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: uv run alembic upgrade head

      - name: Test
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
          RUN_DATABASE_TESTS: "1"
        run: uv run pytest --tb=short

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend

      - name: Build
        working-directory: ./frontend
        run: npm run build

  database:
    name: Database Migration Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: menuscan_test
          POSTGRES_USER: menuscan
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menuscan -d menuscan_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: uv run alembic upgrade head

      - name: Check model and migration consistency
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: uv run alembic check

      - name: Run database integration tests
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
          RUN_DATABASE_TESTS: "1"
        run: uv run pytest tests/test_database_integration.py --tb=short

      - name: Verify rollback and clean re-upgrade
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: |
          uv run alembic downgrade base
          uv run alembic upgrade head
          uv run alembic check

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v7

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Run tests with coverage
        id: pytest
        run: |
          set -o pipefail
          uv run --with pytest-cov pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=70 2>&1 | tee coverage-output.txt
        continue-on-error: true

      - name: Post coverage comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('app/coverage-output.txt', 'utf8');
            const passed = '${{ steps.pytest.outcome }}' === 'success';
            const icon = passed ? '[PASS]' : '[FAIL]';
            const status = passed ? 'Passed (>= 70%)' : 'Failed (< 70%)';
            const body = [
              `## ${icon} Code Coverage - ${status}`,
              '',
              '<details><summary>Coverage Report</summary>',
              '',
              '```',
              output.trim(),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage.xml

      - name: Enforce coverage threshold
        if: steps.pytest.outcome == 'failure'
        run: exit 1
