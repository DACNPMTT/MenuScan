name: Deploy to Cloud Run

# Reusable deploy pipeline: build & push image, run Alembic migrations as a
# Cloud Run Job, deploy a candidate revision with NO traffic, smoke-test it,
# then promote to 100% traffic. On any failure production traffic stays on the
# previous good revision (automatic rollback).

on:
  workflow_call:

env:
  PROJECT_ID: menuscan-500911
  REGION: asia-southeast1
  SERVICE: menuscan-api
  IMAGE: asia-southeast1-docker.pkg.dev/menuscan-500911/cloud-run-source-deploy/menuscan-api
  CLOUDSQL_INSTANCE: menuscan-500911:asia-southeast1:menuscan-db
  WIF_PROVIDER: projects/754814183582/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  DEPLOY_SA: github-actions-deploy@menuscan-500911.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate & configure gcloud
        uses: ./.github/actions/setup-gcloud
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
          region: ${{ env.REGION }}

      - name: Compute image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} \
            -t ${{ env.IMAGE }}:latest \
            ./app
          docker push ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }}
          docker push ${{ env.IMAGE }}:latest

      # ── Run Alembic migrations BEFORE updating Cloud Run ────────────────────
      - name: Run database migrations (Cloud Run Job)
        run: |
          gcloud run jobs deploy menuscan-migrate \
            --image ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} \
            --region ${{ env.REGION }} \
            --set-cloudsql-instances ${{ env.CLOUDSQL_INSTANCE }} \
            --set-env-vars "APP_ENV=production" \
            --set-secrets "DATABASE_URL=database-url:latest,SECRET_KEY=secret-key:latest" \
            --command "uv" \
            --args "run,python,-m,alembic,upgrade,head" \
            --max-retries 1 \
            --task-timeout 120s \
            --execute-now \
            --wait

      # ── Build the Cloud Run env file ────────────────────────────────────────
      # This file holds ONLY non-secret configuration. Sensitive values
      # (DATABASE_URL, SECRET_KEY, API keys, SMTP password) live in Secret
      # Manager and are wired in via --set-secrets on the deploy step below, so
      # they are never written into the Cloud Run revision config. A YAML file
      # is used (instead of repeated --set-env-vars) so values containing commas
      # (e.g. LLM_MODELS) are not mis-parsed by gcloud.
      - name: Generate Cloud Run env file
        run: |
          cat > /tmp/env.yaml <<EOF
          APP_ENV: "production"
          LOG_LEVEL: "INFO"
          API_V1_PREFIX: "/api/v1"
          MAGIC_LINK_BASE_URL: "${{ secrets.DEV_FRONTEND_URL }}"
          CORS_ORIGINS: "${{ secrets.DEV_CORS_ORIGINS || secrets.DEV_FRONTEND_URL }}"
          EMAIL_PROVIDER: "gmail_smtp"
          EMAIL_FROM_ADDRESS: "${{ secrets.DEV_EMAIL_SMTP_USERNAME }}"
          EMAIL_SMTP_USERNAME: "${{ secrets.DEV_EMAIL_SMTP_USERNAME }}"
          EMAIL_TIMEOUT_SECONDS: "10"
          OCR_PROVIDER: "google_vision"
          GOOGLE_VISION_MODEL: "DOCUMENT_TEXT_DETECTION"
          LLM_PROVIDER: "gemini"
          LLM_MODEL: "gemini-3.1-flash-lite"
          LLM_MODELS: "gemini-3.1-flash-lite,gemini-2.5-flash"
          LLM_FALLBACK_MODEL: "gemini-2.5-flash"
          # Enrichment and chat get their own key pools (their API keys live in
          # Secret Manager). Sharing the scan key means they compete for the
          # same per-minute quota — enrichment fires batches right after a scan
          # drains it, which is a 429 by construction: no dish tags, no verdicts.
          ENRICH_LLM_PROVIDER: "gemini"
          ENRICH_LLM_MODEL: "gemini-3.1-flash-lite"
          ENRICH_LLM_TIMEOUT_SECONDS: "60"
          CHAT_LLM_PROVIDER: "gemini"
          CHAT_LLM_MODEL: "gemini-3.1-flash-lite"
          LLM_TIMEOUT_SECONDS: "100"
          LLM_MULTIMODAL: "true"
          LLM_IMAGE_MAX_DIMENSION: "1536"
          LLM_PREALIGN_CSV: "true"
          SCAN_MIN_GAP_SECONDS: "10"
          CHAT_MIN_GAP_SECONDS: "5"
          STORAGE_PROVIDER: "local"
          STORAGE_LOCAL_ROOT: "/app/storage/objects"
          SCAN_STALE_TIMEOUT_MINUTES: "10"
          EXCHANGE_RATE_API_BASE_URL: "https://open.er-api.com/v6"
          EXCHANGE_RATE_TIMEOUT_SECONDS: "10"
          EXCHANGE_RATE_CACHE_TTL_SECONDS: "3600"
          EOF

      # ── Deploy the new revision WITHOUT traffic (candidate) ─────────────────
      # `--no-traffic --tag candidate` publishes the revision at a dedicated
      # candidate URL while 100% of production traffic stays on the current
      # good revision. Nothing user-facing changes until the smoke test passes.
      - name: Deploy candidate revision (no traffic)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ env.CLOUDSQL_INSTANCE }} \
            --env-vars-file /tmp/env.yaml \
            --set-secrets "DATABASE_URL=database-url:latest,SECRET_KEY=secret-key:latest,EMAIL_SMTP_PASSWORD=email-smtp-password:latest,GOOGLE_VISION_API_KEY=google-vision-api-key:latest,GEMINI_API_KEY=gemini-api-key:latest,GEMINI_API_KEYS=gemini-api-keys:latest,ENRICH_GEMINI_API_KEYS=enrich-gemini-api-keys:latest,CHAT_GEMINI_API_KEYS=chat-gemini-api-keys:latest" \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 40 \
            --cpu-boost \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --no-traffic \
            --tag candidate
            # ── Scaling rationale (validated via load-test/, see its README) ──
            # --concurrency 40 : this API is mostly I/O-bound (each scan/chat
            #   request spends its time awaiting Gemini/Vision), so one instance
            #   can hold many in-flight requests cheaply. 40 leaves CPU head-
            #   room for the synchronous image-resize/JSON-parse work on 1 vCPU;
            #   raise it toward 80 only if the k6 run shows p95 staying flat.
            # --cpu-boost : extra CPU during container startup to cut cold-start
            #   latency. Costs only during boot — the cost-smart alternative to
            #   pinning --min-instances 1 (which bills 24/7). For a demo where a
            #   warm first request matters, temporarily run with --min-instances 1
            #   then set it back to 0 afterwards, same as the Cloud SQL toggle.
            # --max-instances 3 : ceiling so a traffic spike (or a runaway loop)
            #   cannot fan out and drain credit. At concurrency 40 that is up to
            #   ~120 concurrent requests — well past this project's real load.

      # ── Smoke-test the candidate before shifting any traffic ────────────────
      # Hard gate on /health (process is up and serving HTTP). /ready is logged
      # for visibility (DB/email/storage wiring) but does not fail the deploy —
      # promote it to a hard gate later if you want DB connectivity enforced.
      - name: Smoke test candidate
        id: smoke
        run: |
          CANDIDATE_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format=json | jq -r '.status.traffic[] | select(.tag=="candidate") | .url')
          echo "Candidate URL: $CANDIDATE_URL"
          if [ -z "$CANDIDATE_URL" ] || [ "$CANDIDATE_URL" = "null" ]; then
            echo "Could not resolve candidate URL — aborting."
            exit 1
          fi

          ok=""
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$CANDIDATE_URL/health" || echo 000)
            echo "Health attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then ok="1"; break; fi
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "Candidate failed /health — will NOT shift traffic."
            exit 1
          fi

          ready=$(curl -s -o /dev/null -w '%{http_code}' "$CANDIDATE_URL/ready" || echo 000)
          echo "Readiness (/ready) informational: HTTP $ready"

      # ── Promote candidate to 100% traffic ──────────────────────────────────
      - name: Promote candidate to production
        if: steps.smoke.outcome == 'success'
        run: |
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --to-latest \
            --remove-tags candidate

      # ── Auto-rollback: on any failure production traffic stays on the last ──
      # good revision (we never shifted it). We only drop the candidate tag so
      # the broken revision does not linger with a public URL.
      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "::error::Deployment failed — production traffic remains on the previous good revision."
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --remove-tags candidate || true

      - name: Show Cloud Run service URL
        if: success()
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Deployed: $URL"
          echo "### Deployed to Cloud Run :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
