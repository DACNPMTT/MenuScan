name: CD - Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: menuscan-500911
  REGION: asia-southeast1
  SERVICE: menuscan-api
  IMAGE: asia-southeast1-docker.pkg.dev/menuscan-500911/cloud-run-source-deploy/menuscan-api

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/754814183582/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-deploy@menuscan-500911.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} \
            -t ${{ env.IMAGE }}:latest \
            ./app
          docker push ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }}
          docker push ${{ env.IMAGE }}:latest

      # ── Run Alembic migrations BEFORE updating Cloud Run ────────────────────
      - name: Run database migrations (Cloud Run Job)
        run: |
          # Delete previous migration job if it exists
          gcloud run jobs delete menuscan-migrate \
            --region ${{ env.REGION }} --quiet 2>/dev/null || true

          # Create and execute migration job
          gcloud run jobs create menuscan-migrate \
            --image ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} \
            --region ${{ env.REGION }} \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:menuscan-db \
            --set-env-vars "DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}" \
            --set-env-vars "APP_ENV=production" \
            --command "uv" \
            --args "run,python,-m,alembic,upgrade,head" \
            --max-retries 1 \
            --task-timeout 120s

          gcloud run jobs execute menuscan-migrate \
            --region ${{ env.REGION }} \
            --wait

      # ── Deploy to Cloud Run ─────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha_short }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:menuscan-db \
            --set-env-vars "APP_ENV=production" \
            --set-env-vars "LOG_LEVEL=INFO" \
            --set-env-vars "API_V1_PREFIX=/api/v1" \
            --set-env-vars "MAGIC_LINK_BASE_URL=${{ secrets.DEV_FRONTEND_URL }}" \
            --set-env-vars "CORS_ORIGINS=${{ secrets.DEV_FRONTEND_URL }}" \
            --set-env-vars "DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}" \
            --set-env-vars "SECRET_KEY=${{ secrets.DEV_SECRET_KEY }}" \
            --set-env-vars "EMAIL_PROVIDER=resend" \
            --set-env-vars "EMAIL_FROM_ADDRESS=${{ secrets.DEV_EMAIL_FROM_ADDRESS }}" \
            --set-env-vars "EMAIL_API_KEY=${{ secrets.DEV_EMAIL_API_KEY }}" \
            --set-env-vars "EMAIL_API_BASE_URL=https://api.resend.com" \
            --set-env-vars "EMAIL_TIMEOUT_SECONDS=10" \
            --set-env-vars "OCR_PROVIDER=google_vision" \
            --set-env-vars "GOOGLE_VISION_API_KEY=${{ secrets.DEV_GOOGLE_VISION_API_KEY }}" \
            --set-env-vars "GOOGLE_VISION_MODEL=DOCUMENT_TEXT_DETECTION" \
            --set-env-vars "LLM_PROVIDER=gemini" \
            --set-env-vars "LLM_MODEL=gemini-3.1-flash-lite" \
            --set-env-vars "LLM_MODELS=gemini-3.1-flash-lite,gemini-2.5-flash" \
            --set-env-vars "LLM_FALLBACK_MODEL=gemini-2.5-flash" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.DEV_GEMINI_API_KEY }}" \
            --set-env-vars "GEMINI_API_KEYS=${{ secrets.DEV_GEMINI_API_KEYS }}" \
            --set-env-vars "LLM_TIMEOUT_SECONDS=100" \
            --set-env-vars "LLM_MULTIMODAL=true" \
            --set-env-vars "LLM_IMAGE_MAX_DIMENSION=1536" \
            --set-env-vars "LLM_PREALIGN_CSV=true" \
            --set-env-vars "STORAGE_PROVIDER=local" \
            --set-env-vars "STORAGE_LOCAL_ROOT=/app/storage/objects" \
            --set-env-vars "SCAN_STALE_TIMEOUT_MINUTES=10" \
            --set-env-vars "EXCHANGE_RATE_API_BASE_URL=https://open.er-api.com/v6" \
            --set-env-vars "EXCHANGE_RATE_TIMEOUT_SECONDS=10" \
            --set-env-vars "EXCHANGE_RATE_CACHE_TTL_SECONDS=3600" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300

      - name: Show Cloud Run service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "✅ Deployed: $URL"
