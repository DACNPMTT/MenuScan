name: CD - Deploy Dev

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.vars.outputs.sha_short }}
      image-name: ${{ steps.vars.outputs.image_name }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:dev

  deploy:
    name: Deploy Backend to Dev (Kubernetes)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure dev namespace exists
        run: kubectl apply -f k8s/dev/namespace.yaml

      - name: Apply backend runtime secrets
        run: |
          kubectl create secret generic menuscan-backend-secrets \
            --namespace dev \
            --from-literal=DATABASE_URL='${{ secrets.DEV_DATABASE_URL }}' \
            --from-literal=SECRET_KEY='${{ secrets.DEV_SECRET_KEY }}' \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/dev/

      - name: Update deployment image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image-name }}:sha-${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/menuscan-backend backend="$IMAGE" -n dev

      - name: Wait for rollout
        run: kubectl rollout status deployment/menuscan-backend -n dev --timeout=120s
