name: CD - Deploy Dev

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.vars.outputs.sha_short }}
      image-name: ${{ steps.vars.outputs.image_name }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Compute image variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:dev

  deploy:
    name: Deploy Backend to Dev (Kubernetes)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure dev namespace exists
        run: kubectl apply -f k8s/dev/namespace.yaml

      - name: Apply backend runtime secrets
        run: |
          kubectl create secret generic menuscan-backend-secrets \
            --namespace dev \
            --from-literal=DATABASE_URL='${{ secrets.DEV_DATABASE_URL }}' \
            --from-literal=SECRET_KEY='${{ secrets.DEV_SECRET_KEY }}' \
            --from-literal=GOOGLE_VISION_API_KEY='${{ secrets.DEV_GOOGLE_VISION_API_KEY }}' \
            --from-literal=GEMINI_API_KEY='${{ secrets.DEV_GEMINI_API_KEY }}' \
            --from-literal=GEMINI_API_KEYS='${{ secrets.DEV_GEMINI_API_KEYS }}' \
            --from-literal=EMAIL_API_KEY='${{ secrets.DEV_EMAIL_API_KEY }}' \
            --from-literal=EMAIL_FROM_ADDRESS='${{ secrets.DEV_EMAIL_FROM_ADDRESS }}' \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/dev/

      - name: Update deployment image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image-name }}:sha-${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/menuscan-backend backend="$IMAGE" -n dev

      - name: Wait for rollout
        run: kubectl rollout status deployment/menuscan-backend -n dev --timeout=120s

      - name: Run database migrations
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image-name }}:sha-${{ needs.build-and-push.outputs.image-tag }}"
          # Delete previous migration job if it exists (idempotent)
          kubectl delete job menuscan-migrate --namespace dev --ignore-not-found
          # Spawn a one-off migration job using the same image + secrets
          kubectl create job menuscan-migrate \
            --namespace dev \
            --from=cronjob/menuscan-migrate 2>/dev/null || \
          kubectl run menuscan-migrate \
            --namespace dev \
            --image="$IMAGE" \
            --restart=Never \
            --env-from=configmap/menuscan-backend-config \
            --env-from=secret/menuscan-backend-secrets \
            -- python -m alembic upgrade head
          # Wait for migration to complete
          kubectl wait pod \
            --for=condition=Succeeded \
            --selector=batch.kubernetes.io/job-name=menuscan-migrate \
            --namespace dev \
            --timeout=120s 2>/dev/null || \
          kubectl logs -n dev menuscan-migrate

