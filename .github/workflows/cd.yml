name: CD - Deploy to Cloud Run

# Orchestrator. The actual pipeline lives in the reusable workflow deploy.yml.
#
# NOTE: `main` is currently treated as the single live environment and reuses
# the existing `DEV_*` secrets + Cloud SQL instance `menuscan-db`. To split a
# separate production environment later, add a second job that calls deploy.yml
# with `PROD_*` secrets and a dedicated Cloud SQL instance / service name.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/cd-deploy.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
