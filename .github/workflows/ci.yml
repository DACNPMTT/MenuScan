name: CI

on:
  push:
    branches: [dev]
    paths:
      - 'app/**'
      - 'frontend/**'
      - 'doc/diagrams/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [dev]
    paths:
      - 'app/**'
      - 'frontend/**'
      - 'doc/diagrams/**'
      - '.github/workflows/ci.yml'

jobs:
  # ─────────────────────────────────────
  # Gate: Lint phải pass trước khi chạy test/build
  # ─────────────────────────────────────
  lint:
    name: Lint (Gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend lint ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'app/uv.lock'

      - name: Backend lint
        working-directory: ./app
        run: |
          uv sync --locked --all-groups
          uv run ruff check .

      # ── Frontend lint ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Frontend lint
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint

  # ─────────────────────────────────────
  # Backend: test với PostgreSQL service
  # ─────────────────────────────────────
  test-backend:
    name: Test Backend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: menuscan_test
          POSTGRES_USER: menuscan
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menuscan -d menuscan_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'app/uv.lock'

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: uv run alembic upgrade head

      - name: Test
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
          RUN_DATABASE_TESTS: '1'
        run: uv run pytest --tb=short

  # ─────────────────────────────────────
  # Frontend: type-check + build
  # ─────────────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─────────────────────────────────────
  # Database: Alembic migration validation
  # ─────────────────────────────────────
  database:
    name: Database Migration Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: menuscan_test
          POSTGRES_USER: menuscan
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menuscan -d menuscan_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'app/uv.lock'

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: uv run alembic upgrade head

      - name: Check model and migration consistency
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: uv run alembic check

      - name: Run database integration tests
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
          RUN_DATABASE_TESTS: '1'
        run: uv run pytest tests/test_database_integration.py --tb=short

      - name: Verify rollback and clean re-upgrade
        env:
          DATABASE_URL: postgresql://menuscan:testpass@localhost:5432/menuscan_test
        run: |
          uv run alembic downgrade base
          uv run alembic upgrade head
          uv run alembic check
