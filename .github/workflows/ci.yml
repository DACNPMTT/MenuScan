name: CI

# Orchestrator. Each concern lives in its own reusable workflow:
#   ci-lint.yml      - ruff + eslint (gate)
#   ci-test.yml      - backend tests, frontend build, migration checks, coverage
#   ci-security.yml  - Trivy (vuln/IaC/secret), Bandit SAST, Docker build validation
# Shared setup is factored into composite actions under .github/actions/.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, edited]

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/ci-lint.yml

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/ci-test.yml
    permissions:
      contents: read
      issues: write
      pull-requests: write

  security:
    name: Security
    uses: ./.github/workflows/ci-security.yml
    permissions:
      contents: read
      issues: write
      pull-requests: write
