version: 2

updates:
  - package-ecosystem: uv
    directory: /app
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh
    labels:
      - dependencies
      - python

  - package-ecosystem: npm
    directory: /frontend
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Ho_Chi_Minh
    labels:
      - dependencies
      - frontend

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Ho_Chi_Minh
    labels:
      - dependencies
      - github-actions
